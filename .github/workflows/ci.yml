name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Compile via the same path release uses (swiftc -O). No signing needed.
      - name: Build
        run: make build

      # Runs the unit tests once a test target exists; a no-op (exit 0) until then.
      - name: Test
        run: swift test
