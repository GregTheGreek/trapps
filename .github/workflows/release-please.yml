name: Release Please

# Versioning only: bump the version, update the changelog, tag, and publish the
# GitHub release. Signing and notarization are done locally (they need the
# Developer ID private key, which is deliberately kept off GitHub) - after this
# release is created, run `make release && make notarize` and upload the zip.
# See the "Releasing" section in README.md.

on:
  push:
    branches: [main]

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
